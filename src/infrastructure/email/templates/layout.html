<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>{{subject}}</title>
    <style>
      /* Base */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #f4f4f7;
        color: #51545e;
        margin: 0;
        padding: 0;
        width: 100%;
        -webkit-text-size-adjust: none;
      }

      /* Container */
      .email-wrapper {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #f4f4f7;
      }

      .email-content {
        width: 100%;
        margin: 0;
        padding: 0;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Header */
      .email-masthead {
        padding: 25px 0;
        text-align: center;
      }

      .email-masthead_logo {
        width: 94px;
        max-height: 94px;
      }

      .email-masthead_name {
        font-size: 16px;
        font-weight: bold;
        color: #a8aaaf;
        text-decoration: none;
        text-shadow: 0 1px 0 white;
      }

      /* Body */
      .email-body {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.05);
      }

      .email-body_inner {
        width: 570px;
        margin: 0 auto;
        padding: 45px;
      }

      /* Footer */
      .email-footer {
        width: 570px;
        margin: 0 auto;
        padding: 57px;
        text-align: center;
      }

      .email-footer p {
        color: #aeaeae;
      }

      .body-action {
        width: 100%;
        text-align: center;
      }

      /* Typography */
      h1 {
        margin-top: 0;
        color: #333333;
        font-size: 22px;
        font-weight: bold;
        text-align: left;
      }

      h2 {
        margin-top: 0;
        color: #333333;
        font-size: 16px;
        font-weight: bold;
        text-align: left;
      }

      h3 {
        margin-top: 0;
        color: #333333;
        font-size: 14px;
        font-weight: bold;
        text-align: left;
      }

      p {
        margin-top: 0;
        color: #51545e;
        font-size: 16px;
        line-height: 1.625;
      }

      .button {
        display: inline-block;
        background-color: #3869d4;
        color: #ffffff;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        text-decoration: none;
        border-radius: 3px;
        padding: 10px 18px;
        margin: 20px 0;
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.16);
        -webkit-text-size-adjust: none;
      }

      /* Mobile */
      @media only screen and (max-width: 600px) {
        .email-body_inner,
        .email-footer {
          width: 100% !important;
          padding: 25px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="email-wrapper">
      <div class="email-content">
        <!-- Header -->
        <div class="email-masthead">
          <!-- Logo (conditionally hidden by derived variable) -->
          <a href="{{productUrl}}" class="email-masthead_name" style="display: {{logoDisplay}};">
            <img src="{{projectLogoUrl}}" class="email-masthead_logo" alt="{{projectName}}" />
          </a>

          <!-- Text Name (fallback if no logo) -->
          <a href="{{productUrl}}" class="email-masthead_name" style="display: {{nameDisplay}};">
            {{projectName}}
          </a>
        </div>

        <!-- Body -->
        <div class="email-body">
          <div class="email-body_inner">{{content}}</div>
        </div>

        <!-- Footer -->
        <div class="email-footer">
          <p class="sub center">
            &copy; {{currentYear}} {{projectName}}. All rights reserved.
            <br />
            <a href="mailto:{{supportEmail}}" style="color: #aeaeae; text-decoration: underline"
              >Contact Support</a
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
